sonar.projectKey=daa-internal_daa-turn-file-integration
sonar.projectName=AOS Schedule Converter
sonar.organization=daa-org

sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Application code (CLI entry points excluded — thin wrappers, not measured for coverage)
sonar.sources=src,ui
sonar.tests=tests

# Coverage report produced in CI (pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/tests/**,**/__pycache__/**,**/static/**,**/.gitkeep,scripts/**
sonar.test.inclusions=tests/**

# CLI entry points and legacy scripts are exercised manually; exclude from coverage gate
sonar.coverage.exclusions=run.py,ui_app.py,staging_runner.py,scripts/**
